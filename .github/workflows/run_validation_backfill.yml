name: Run Validation Backfill
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Selbsttest
        run: python validate_backfill.py --test
      - name: Live-Lauf
        run: python validate_backfill.py
      - name: Commit and push validation_dataset.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add validation_dataset.json
          git diff --staged --quiet && exit 0
          git commit -m "Data: Aktualisiere validation_dataset.json"
          git pull --rebase origin main
          git push
