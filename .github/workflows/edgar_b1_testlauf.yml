name: WEGWERF EDGAR B1 Testlauf (material_8k selftest, read-only)

# ─────────────────────────────────────────────────────────────────────────
# TEMPORÄRER WEGWERF-WORKFLOW — nach dem Lauf sofort wieder entfernen.
#
# Zweck (Schritt-B1-Testlauf, §6c): führt den material_8k-Collector des
# Feature-Branches gegen ECHTES SEC-EDGAR aus, um die EXZELLENZ-Punkte 1 + 4
# und das Zeitbudget EMPIRISCH zu belegen (nicht zu schätzen):
#   • FDA-Ticker (LENZ/REPL) → Roh-Event mit acceptance<=asof, item_code UND
#     matched_term aus dem EXHIBIT.
#   • Non-Pharma (AAPL) → 8-K da (Earnings 2.02), matched_terms LEER.
#   • Unbekannter Ticker (ZZZZZ) → no_cik fail-soft.
#   • Timing: 10-Ticker-Batch (Top-10-Größe) → reale Zusatzzeit.
#
# READ-ONLY: nur GET gegen SEC EDGAR keyless. KEIN Repo-Write. Führt NUR den
# material_8k-Selbsttest aus (keine Score-/Push-/Persistenz-Pfade).
# checkout des Feature-Branches, weil material_8k dort (noch nicht auf main) liegt.
# ─────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  testlauf:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        shell: bash --noprofile --norc {0}

    env:
      EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}

    steps:
      - name: Checkout Feature-Branch
        uses: actions/checkout@v4
        with:
          ref: claude/session-handover-refresh-ffu6cr

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install --quiet requests

      - name: EXZELLENZ 1a — FDA-Ticker LENZ (aceclidine-Zulassung 2025-11-05)
        run: |
          echo "Erwartung: 8-K acceptance<=asof, item 7.01/8.01, matched_term 'received FDA approval' aus EX-99"
          python -m material_8k --ticker LENZ --asof 2025-11-07 --lookback 5

      - name: EXZELLENZ 1a — FDA-Ticker REPL (RP1 CRL 2025-07-22)
        run: |
          echo "Erwartung: matched_term 'Complete Response Letter' aus EX-99"
          python -m material_8k --ticker REPL --asof 2025-07-24 --lookback 5

      - name: EXZELLENZ 1a — FDA-Ticker TNXP (Tonmya-Zulassung ~2025-09)
        run: |
          echo "Erwartung: matched_term 'received FDA approval' (breiterer Lookback wg. unsicherem Tag)"
          python -m material_8k --ticker TNXP --asof 2025-10-01 --lookback 40

      - name: EXZELLENZ 4a — Non-Pharma AAPL (Earnings-8-K, KEIN FDA-Fehlmatch)
        run: |
          echo "Erwartung: 8-K (item 2.02) da, matched_terms LEER"
          python -m material_8k --ticker AAPL --asof 2025-11-05 --lookback 10

      - name: fail-soft — unbekannter Ticker
        run: |
          echo "Erwartung: collected=false, reason=no_cik, kein Crash"
          python -m material_8k --ticker ZZZZZ --asof 2025-11-07

      - name: Zeitbudget — 10-Ticker-Batch (Top-10-Größe), asof=jetzt
        run: |
          echo "Erwartung: reale Zusatzzeit für Top-10 (Belege statt Schätzung)"
          python -m material_8k \
            --ticker LENZ --ticker REPL --ticker TNXP --ticker ZBIO --ticker ANAB \
            --ticker AAPL --ticker NVDA --ticker TSLA --ticker AMC --ticker GME
