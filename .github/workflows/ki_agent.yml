name: KI-Agent Squeeze Monitor

on:
  schedule:
    # Stündlich auf Minute 17, 24/7 — Offset weg von der vollen Stunde,
    # weil GitHub Actions Scheduled-Workflows bei Last-Peaks zur :00 dropped
    # (dokumentiertes Verhalten, beobachtet 11.–14.05.2026 mit nur ~45 %
    # der erwarteten Ticks bei `0 * * * *`). Alert-Cooldown
    # (ALERT_COOLDOWN_HOURS=2 in config.py) bleibt unverändert und
    # verhindert Spam unabhängig vom Run-Intervall.
    - cron: '17 * * * *'
  workflow_dispatch:   # Manueller Start jederzeit möglich

permissions:
  contents: write   # Für Commit von agent_signals.json / agent_state.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-ki-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Pull squeeze_data from Gist
        env:
          GIST_ID:        ${{ secrets.GIST_ID }}
          GIST_TOKEN:     ${{ secrets.GIST_TOKEN }}
          POSITIONS_JSON: ${{ secrets.POSITIONS_JSON }}
        run: python scripts/pull_gist_data.py

      - name: Run KI-Agent
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python ki_agent.py

      - name: Commit state and signal files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agent_signals.json agent_state.json
          git add app_data.json 2>/dev/null || true
          git add backtest_history.json 2>/dev/null || true
          # watchlist_personal.json wird vom Pull-Gist-Step
          # (scripts/pull_gist_data.py) materialisiert. Ohne dieses
          # ``git add`` bleibt die Datei modified-unstaged und blockiert
          # die anschließende ``git pull --rebase``-Precondition (siehe
          # auch daily-squeeze-report.yml mit identischem Fix).
          git add watchlist_personal.json 2>/dev/null || true
          # Health-Check-Persistenz (Phase 1/2): JSONL-Files werden vom
          # health_check.py-Hook im KI-Agent-Tick geschrieben (S2/S3/S6
          # + Provider-Rows). Ohne git add gehen sie zwischen Runs
          # verloren — Digest-Workflow sah dauerhaft 0 Daten.
          git add health_check_log.jsonl 2>/dev/null || true
          git add provider_health.jsonl 2>/dev/null || true
          # gist_pull_state.json: Liveness-Marker, vom Pull-Step NUR bei
          # HTTP-Gist-Erfolg geschrieben. Committen, sonst Reset beim
          # nächsten Checkout → Marker altert fälschlich.
          git add gist_pull_state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit noetig."
            exit 0
          fi
          git commit -m "KI-Agent update $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Recovery-Logik analog zu daily-squeeze-report.yml: Precondition-
          # Fail vor Rebase-Start vs. Konflikt mid-Rebase getrennt behandeln.
          # Bei JSON-Konflikten ``--ours`` = upstream (paralleler Workflow-Run),
          # nicht-JSON-Konflikte sind Fehler.
          if ! git pull --rebase origin main; then
            if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
              conflicted=$(git diff --name-only --diff-filter=U)
              conflicted_other=$(echo "$conflicted" | grep -v '\.json$' || true)
              if [ -n "$conflicted_other" ]; then
                echo "ERROR: Konflikt in nicht-JSON-Dateien — Abbruch:"
                echo "$conflicted_other"
                git rebase --abort
                exit 1
              fi
              conflicted_json=$(echo "$conflicted" | grep '\.json$' || true)
              echo "JSON-Konflikte erkannt, übernehme --ours (upstream):"
              echo "$conflicted_json"
              for f in $conflicted_json; do
                git checkout --ours -- "$f"
                git add -- "$f"
              done
              GIT_EDITOR=true git rebase --continue
            else
              echo "ERROR: git pull --rebase scheiterte vor Rebase-Start."
              echo "Wahrscheinliche Ursache: Datei wurde geschrieben aber"
              echo "nicht ge-add-ed (siehe Working-Tree-Status unten)."
              echo "→ git add-Block oben um die fehlende Datei erweitern."
              git status --short
              exit 1
            fi
          fi
          git push origin main
