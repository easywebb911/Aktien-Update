name: KI-Agent Squeeze Monitor

on:
  schedule:
    # Alle 15 Minuten, 13:00–20:45 UTC
    # Deckt NYSE-Handelszeiten 09:00–16:00 ET ganzjährig ab:
    #   Winter (EST = UTC−5): 13:00–20:45 UTC → 08:00–15:45 ET
    #   Sommer (EDT = UTC−4): 13:00–20:45 UTC → 09:00–16:45 ET
    # Genaue Schranke: is_trading_hours() per pytz/zoneinfo in ki_agent.py
    - cron: '*/15 13-20 * * 1-5'
  workflow_dispatch:   # Manueller Start jederzeit möglich

permissions:
  contents: write   # Für Commit von agent_signals.json / agent_state.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-ki-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run KI-Agent
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: python ki_agent.py

      - name: Commit state and signal files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agent_signals.json agent_state.json
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit noetig."
            exit 0
          fi
          git commit -m "KI-Agent update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push origin main
