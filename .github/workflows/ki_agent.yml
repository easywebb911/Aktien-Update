name: KI-Agent Squeeze Monitor

on:
  schedule:
    # Stündlich, 24/7 — Alert-Cooldown (ALERT_COOLDOWN_HOURS=2 in config.py)
    # bleibt unverändert und verhindert Spam unabhängig vom Run-Intervall.
    - cron: '0 * * * *'
  workflow_dispatch:   # Manueller Start jederzeit möglich

permissions:
  contents: write   # Für Commit von agent_signals.json / agent_state.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-ki-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build positions.json from secret
        env:
          POSITIONS_JSON: ${{ secrets.POSITIONS_JSON }}
        run: |
          if [ -n "$POSITIONS_JSON" ]; then
            echo "$POSITIONS_JSON" > positions.json
          else
            echo '{}' > positions.json
          fi

      - name: Run KI-Agent
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: python ki_agent.py

      - name: Commit state and signal files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add agent_signals.json agent_state.json
          git add app_data.json 2>/dev/null || true
          git add backtest_history.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen — kein Commit noetig."
            exit 0
          fi
          git commit -m "KI-Agent update $(date -u '+%Y-%m-%d %H:%M') UTC"
          git pull --rebase origin main
          git push origin main
