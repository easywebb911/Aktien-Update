name: Squeeze Alert Monitor

on:
  # Manuelle Reserve – Alerts laufen primär via ki_agent.yml
  workflow_dispatch:

permissions:
  contents: write   # Benötigt um baseline.json und last_alert.json zu commiten

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-alert-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert monitor
        env:
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python alert.py

      - name: Commit state files
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add baseline.json last_alert.json
          if git diff --staged --quiet; then
            echo "Keine Statusaenderungen."
            exit 0
          fi
          git commit -m "Alert state update $(date -u '+%Y-%m-%d %H:%M') UTC"
          # Pull rebase before push to handle concurrent workflow runs
          git pull --rebase origin main
          git push origin main
