name: FINRA & Fintel API Test

on:
  workflow_dispatch:   # Nur manuell auslösbar

jobs:
  test-apis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install requests
        run: pip install requests

      - name: Run API diagnostic
        env:
          FINRA_API_TOKEN:     ${{ secrets.FINRA_API_TOKEN }}
          FINRA_CLIENT_ID:     ${{ secrets.FINRA_CLIENT_ID }}
          FINRA_CLIENT_SECRET: ${{ secrets.FINRA_CLIENT_SECRET }}
        run: python test_finra.py
