name: EDGAR A2b Re-Probe (§6c geschärfte FDA-Keywords, read-only, WEGWERF)

# ─────────────────────────────────────────────────────────────────────────────
# WEGWERF-DIAGNOSE — Re-Probe der GESCHÄRFTEN FDA-Keyword-Liste gegen dieselbe
# Spezifitäts-Gegenprobe (ANAB klinisch → soll ~0). workflow_dispatch, nur von
# main startbar. Schreibt NICHTS ins Repo — reine Konsolen-Logs.
# permissions: contents: read. keyless EDGAR (efts). Nach Auswertung: Revert.
#
# Drei Gruppen pro Ticker (REPL/TNXP/LENZ Sensitivität · ANAB Spezifität):
#   KEEP  — spezifische harte Eigen-Aussagen (Erwartung: Biotech>0, ANAB~0)
#   LOOSE — lose Terme (Kontroll-Messung, Erwartung: ANAB weiter laut)
#   VERB  — verb-gebundene NDA/BLA (offene Frage: rettet Verb-Kontext die Spez.?)
#
# Shell bewusst `bash --noprofile --norc {0}` (ohne -e): benigner Exit-1 bricht
# den Step nicht ab. Voraussetzung: Repo-Secret EDGAR_USER_AGENT.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  edgar-a2b-reprobe:
    name: EDGAR A2b geschärfte Keywords re-probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: A2b Re-Probe — geschärfte FDA-Keyword-Trennschärfe
        shell: bash --noprofile --norc {0}
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          UA="${EDGAR_USER_AGENT:-REPLACE_ME your-email@example.com}"
          echo "UA=$UA"; [ "$UA" = "REPLACE_ME your-email@example.com" ] && echo "⚠ EDGAR_USER_AGENT nicht gesetzt — Platzhalter ersetzen!"
          G () { curl -sS -H "User-Agent: $UA" "$1"; sleep 0.7; }
          enc () { jq -rn --arg s "$1" '("\"" + $s + "\"")|@uri'; }
          declare -A CIK=( [REPL]=1737953 [TNXP]=1430306 [LENZ]=1815776 [ANAB]=1370053 )

          KEEP=("Complete Response Letter" "PDUFA" "approved by the FDA" "received FDA approval" "FDA has approved" "granted approval")
          LOOSE=("FDA approval" "New Drug Application" "Biologics License Application")
          VERB=("submitted its New Drug Application" "accepted the New Drug Application" "accepted the Biologics License Application" "acceptance of the Biologics License Application")

          probe_kw () {   # $1=ticker $2=keyword
            local T="$1" KW="$2" J N FT
            J=$(G "https://efts.sec.gov/LATEST/search-index?q=$(enc "$KW")&forms=8-K&ciks=$(printf '%010d' ${CIK[$T]})")
            N=$(echo "$J" | jq -r '.hits.total.value // 0')
            FT=$(echo "$J" | jq -r '[.hits.hits[]._source.file_type]|group_by(.)|map("\(length)×\(.[0])")|join(" ")' 2>/dev/null)
            printf '    %-46s total=%-5s ft(Seite): %s\n' "\"$KW\"" "$N" "${FT:-—}"
          }

          run_group () {   # $1 = Array-Name (nameref)
            local -n ARR=$1
            echo; echo "══════════ Gruppe: $1 ══════════"
            for T in REPL TNXP LENZ ANAB; do
              echo "  ── $T (CIK ${CIK[$T]}) ──"
              for KW in "${ARR[@]}"; do probe_kw "$T" "$KW"; done
            done
          }

          echo "ZIEL: KEEP → Biotech behält Exhibit-Treffer, ANAB ~0.  LOOSE → ANAB bleibt laut (Kontrolle)."
          echo "      VERB → misst, ob Verb-Kontext NDA/BLA rettet (ANAB runter?)."
          run_group KEEP
          run_group LOOSE
          run_group VERB

          echo; echo "══════════ SENSITIVITÄT-SPOT: bleiben die KEEP-Treffer im EXHIBIT? (Top-Hits je Biotech) ══════════"
          for T in REPL TNXP LENZ; do
            echo "  ── $T ──"
            for KW in "Complete Response Letter" "approved by the FDA" "received FDA approval" "FDA has approved"; do
              J=$(G "https://efts.sec.gov/LATEST/search-index?q=$(enc "$KW")&forms=8-K&ciks=$(printf '%010d' ${CIK[$T]})")
              N=$(echo "$J" | jq -r '.hits.total.value // 0')
              [ "$N" = "0" ] && { echo "    \"$KW\": 0"; continue; }
              echo "    \"$KW\": $N —"
              echo "$J" | jq -r '.hits.hits[:2][] | "        date=\(._source.file_date)  ft=\(._source.file_type)  items=\(._source.items)"'
            done
          done
