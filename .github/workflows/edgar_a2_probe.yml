name: EDGAR A2 Probe (§6c Item-Code, read-only, WEGWERF)

# ─────────────────────────────────────────────────────────────────────────────
# WEGWERF-DIAGNOSE — A2-Vorab-Klärung für §6c Option 3 (breites materielles-8-K-
# Sammelfeld mit item_code). Läuft NUR per workflow_dispatch, vom Branch nach
# main-Merge (workflow_dispatch nur von main startbar). Schreibt NICHTS ins Repo
# — reine Konsolen-Logs. Kein Commit, kein Artefakt. Kein Merge-Kandidat.
# Nach Auswertung: PR #B (Cleanup-Revert) mergen → Datei wieder weg.
#
# Belegt drei Dinge (read-only): A2a items[]-Zuverlässigkeit · A2b Item-Code-
# Trennschärfe inkl. 8.01-Sammelbecken-Gegenprobe · A2c Feuerrate/Sparsity.
#
# Shell bewusst `bash --noprofile --norc {0}` (OHNE `-eo pipefail`): der A2-Block
# ist so geschrieben, dass ein harmloser Exit-1 den Step nicht abbricht.
#
# Voraussetzung: Repo-Secret EDGAR_USER_AGENT (von den Produktions-Workflows
# genutzt). Fehlt es, zeigt das Log `UA=REPLACE_ME your-email@example.com`.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  edgar-a2-probe:
    name: EDGAR A2 keyless read-only probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: A2 — items[]-Zuverlässigkeit / Item-Code-Trennschärfe / Feuerrate
        shell: bash --noprofile --norc {0}
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          UA="${EDGAR_USER_AGENT:-REPLACE_ME your-email@example.com}"
          echo "UA=$UA"; [ "$UA" = "REPLACE_ME your-email@example.com" ] && echo "⚠ EDGAR_USER_AGENT nicht gesetzt — Platzhalter ersetzen!"
          G () { curl -sS -H "User-Agent: $UA" "$1"; sleep 0.7; }              # rate-limited GET
          enc () { jq -rn --arg s "$1" '("\"" + $s + "\"")|@uri'; }            # exakte Phrase, URL-kodiert
          declare -A CIK=( [REPL]=1737953 [TNXP]=1430306 [LENZ]=1815776 [ANAB]=1370053 \
                           [WOLF]=895419 [AI]=1577526 [IONQ]=1824920 [GPRE]=1309402 [SG]=1477815 )
          BIO="REPL TNXP LENZ ANAB"; NONBIO="WOLF AI IONQ GPRE SG"
          FDAKW=("Complete Response Letter" "PDUFA" "New Drug Application" "Biologics License Application" "FDA approval")

          # submissions 1x pro Ticker cachen (9 Calls)
          for T in $BIO $NONBIO; do G "https://data.sec.gov/submissions/$(printf 'CIK%010d' ${CIK[$T]}).json" > /tmp/sub_$T.json; done

          echo; echo "══════════ A2a — items[] ZUVERLÄSSIGKEIT (Biotech + Non-Biotech) ══════════"
          for T in $BIO $NONBIO; do
            echo "── $T ──"
            jq -r '.filings.recent as $r
              | [range(0;($r.form|length))|select($r.form[.]=="8-K")] as $idx
              | "  8-K(recent)=\($idx|length)  · items LEER: \([$idx[]|select(($r.items[.]//"")=="")]|length)",
                ($idx[0:4][] as $i | "    date=\($r.filingDate[$i])  items=[\($r.items[$i]//"(leer)")]  acc=\($r.acceptanceDateTime[$i])")' /tmp/sub_$T.json
          done

          echo; echo "══════════ A2b — ITEM-CODE-TRENNSCHÄRFE ══════════"
          echo "── b1: FDA-Events der Biotech-Menge → welcher item_code + Exhibit? (efts per-CIK) ──"
          for T in $BIO; do
            echo "  ══ $T (CIK ${CIK[$T]}) ══"
            for KW in "${FDAKW[@]}"; do
              J=$(G "https://efts.sec.gov/LATEST/search-index?q=$(enc "$KW")&forms=8-K&ciks=$(printf '%010d' ${CIK[$T]})")
              N=$(echo "$J" | jq -r '.hits.total.value // 0')
              if [ "$N" = "0" ]; then echo "    kw=\"$KW\": 0"; else
                echo "    kw=\"$KW\": $N Treffer —"
                echo "$J" | jq -r '.hits.hits[:3][] | "      date=\(._source.file_date)  ft=\(._source.file_type)  items=\(._source.items)  \(._source.display_names[0])"'
              fi
            done
          done
          echo "── b2: Ist item 8.01 ein Sammelbecken? Nicht-FDA-Phrasen, forms=8-K, item-Verteilung ──"
          for KW in "share repurchase program" "appointed Chief Executive Officer" "entered into a definitive agreement"; do
            J=$(G "https://efts.sec.gov/LATEST/search-index?q=$(enc "$KW")&forms=8-K")
            echo "$J" | jq -r --arg kw "$KW" '"  \"\($kw)\": total=\(.hits.total.value)  · item-Codes(Seite): " + ([.hits.hits[]._source.items[]?]|group_by(.)|map("\(length)×\(.[0])")|sort|join("  "))'
          done
          echo "── b3: Earnings sauber unter 2.02? efts 'quarterly financial results' ──"
          G "https://efts.sec.gov/LATEST/search-index?q=$(enc 'quarterly financial results')&forms=8-K" \
            | jq -r '"  total=\(.hits.total.value)  · item-Codes(Seite): " + ([.hits.hits[]._source.items[]?]|group_by(.)|map("\(length)×\(.[0])")|sort|join("  "))'

          echo; echo "══════════ A2c — FEUERRATE / SPARSITY ══════════"
          CUT=$(date -u -d '90 days ago' +%Y-%m-%d)
          echo "── breit vs. Earnings (Non-Biotech, letzte 90 Tage seit $CUT) ──"
          for T in $NONBIO; do
            jq -r --arg cut "$CUT" --arg t "$T" '.filings.recent as $r
              | [range(0;($r.form|length))|select($r.form[.]=="8-K" and $r.filingDate[.]>=$cut)] as $idx
              | "  \($t): 8-K/90d=\($idx|length)  · Earnings(2.02)=\([$idx[]|select((($r.items[.]//"")|contains("2.02")))]|length)"' /tmp/sub_$T.json
          done
          echo "── FDA-Teilmenge: harte FDA-8-K der Biotech über 12 Monate (efts date-range, dedup accession) ──"
          START=$(date -u -d '12 months ago' +%Y-%m-%d); END=$(date -u +%Y-%m-%d)
          for T in $BIO; do
            ACC=$(for KW in "${FDAKW[@]}"; do
              G "https://efts.sec.gov/LATEST/search-index?q=$(enc "$KW")&forms=8-K&ciks=$(printf '%010d' ${CIK[$T]})&startdt=$START&enddt=$END" \
                | jq -r '.hits.hits[] | (._source.adsh // (._id|split(":")[0]))'
            done | sort -u | grep -c .)
            echo "  $T: distinct harte FDA-8-K (12 Mon) = $ACC"
          done
