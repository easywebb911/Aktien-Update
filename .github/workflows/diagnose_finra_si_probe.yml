name: Diagnose Short-Interest-Position Probe — FINRA + Nasdaq + Finnhub (read-only)

# Read-only curl-Probe gegen die FINRA EquityShortInterest-API, um EMPIRISCH
# (aus Actions, das FINRA erreicht — die Sandbox ist egress-geblockt) drei
# Fragen zu klären, BEVOR eine Integration erwogen wird:
#   1. Liefert die API die ausstehende Short-POSITION (currentShortShareNumber),
#      nicht nur das Daily Short Volume?
#   2. Sind NASDAQ-Ticker (AMC/IONQ) ENTHALTEN — oder kommt leer/OTC-only? (K.o.)
#   3. Ist settlementDate das Datumsfeld (Basis für #408 pub_date = settlement+7)?
#
# KEINE Code-Pfade aus dem Tool. KEINE Secrets. KEINE Repo-Writes. Reines curl.
# Output komplett im Run-Log + als Artefakt. Trigger: workflow_dispatch only.
#
# Falls die API Auth verlangt (401/403): wird im Log ausgewiesen, NICHT umgangen
# → dann wissen wir, dass ein (kostenloser) FINRA-API-Console-Account nötig ist.

on:
  workflow_dispatch:
    inputs:
      settlement_date:
        description: "FINRA settlementDate (YYYY-MM-DD, ~15./Monatsende)"
        required: true
        default: "2026-06-30"

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      API: "https://api.finra.org/data/group/otcMarket/name/EquityShortInterest"
      OUT_DIR: ${{ github.workspace }}/finra-probe-out
      SD: ${{ github.event.inputs.settlement_date }}

    steps:
      - name: Prepare output dir
        run: mkdir -p "$OUT_DIR"

      - name: Runner egress info (IP + DNS zu den 3 Quellen)
        run: |
          echo "## Runner public IP"
          curl -sS --max-time 5 https://api.ipify.org || true
          echo; echo
          echo "## DNS resolution"
          for h in api.finra.org api.nasdaq.com finnhub.io; do
            echo "- $h"; getent hosts "$h" || echo "  (kein Eintrag)"
          done
          echo "settlementDate-Input: $SD"

      - name: Probe A — anonymer POST, limit 3, KEIN Filter (Schema + Auth-Status)
        run: |
          set +e
          # Zweck: rohe Feldnamen der Records sehen (currentShortShareNumber?
          # settlementDate?) + Auth-Verhalten (200 vs 401/403) OHNE Filter.
          printf '%s' '{"limit":3}' > "$OUT_DIR/reqA.json"
          echo "URL: $API"
          echo "BODY: $(cat "$OUT_DIR/reqA.json")"
          echo "----- verbose -----"
          curl -v --max-time 30 -X POST "$API" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @"$OUT_DIR/reqA.json" \
            -o "$OUT_DIR/A_body.json" \
            -D "$OUT_DIR/A_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE=%{size_download}\nREMOTE_IP=%{remote_ip}\nCONTENT_TYPE=%{content_type}\n" \
            2>&1 || true
          echo; echo "----- response headers -----"; cat "$OUT_DIR/A_headers.txt" || true
          echo "----- body (erste 4000 Zeichen, ungekürzt genug für Feldnamen) -----"
          head -c 4000 "$OUT_DIR/A_body.json" || true
          echo; echo "----- Feld-Check -----"
          grep -o 'currentShortShareNumber' "$OUT_DIR/A_body.json" | head -1 \
            && echo "→ POSITION-Feld currentShortShareNumber PRESENT" \
            || echo "→ currentShortShareNumber NICHT gefunden (prüfe Body oben)"
          grep -o 'settlementDate' "$OUT_DIR/A_body.json" | head -1 \
            && echo "→ settlementDate PRESENT" || echo "→ settlementDate NICHT gefunden"

      - name: Probe B — Ticker-Filter (AMC / IONQ / FRMM) auf settlementDate
        run: |
          set +e
          # Für jeden Ticker: zwei Feldnamen-Varianten testen (symbolCode und
          # issueSymbolIdentifier), weil der exakte Ticker-Feldname aus der
          # Sandbox nicht verifizierbar war. Mind. eine Variante sollte greifen.
          for T in AMC IONQ FRMM; do
            for FIELD in symbolCode issueSymbolIdentifier; do
              REQ="$OUT_DIR/reqB_${T}_${FIELD}.json"
              printf '{"limit":5,"compareFilters":[{"fieldName":"%s","compareType":"EQUAL","fieldValue":"%s"},{"fieldName":"settlementDate","compareType":"EQUAL","fieldValue":"%s"}]}' "$FIELD" "$T" "$SD" > "$REQ"
              echo "==================================================="
              echo "TICKER=$T  FELD=$FIELD  settlementDate=$SD"
              echo "BODY: $(tr -d '\n' < "$REQ")"
              curl -sS --max-time 25 -X POST "$API" \
                -H "Content-Type: application/json" \
                -H "Accept: application/json" \
                --data @"$REQ" \
                -o "$OUT_DIR/B_${T}_${FIELD}.json" \
                -w "HTTP_STATUS=%{http_code} SIZE=%{size_download}\n" 2>&1 || true
              echo "----- body (erste 2500 Zeichen) -----"
              head -c 2500 "$OUT_DIR/B_${T}_${FIELD}.json" || true
              echo
              echo "----- Enthalten? -----"
              grep -o "$T" "$OUT_DIR/B_${T}_${FIELD}.json" | head -1 \
                && echo "→ $T im Response ($FIELD-Filter) — ENTHALTEN" \
                || echo "→ $T NICHT im Response ($FIELD-Filter)"
            done
          done

      # ═══════════════ QUELLE 2: NASDAQ (api.nasdaq.com) ═══════════════
      - name: Probe C — Nasdaq short-interest (AMC / IONQ) — Position, bimonatlich
        run: |
          set +e
          # api.nasdaq.com/api/quote/{T}/short-interest — dieselbe Quelle, die
          # Nasdaq.com im Browser nutzt. Verlangt Browser-User-Agent (sonst 403).
          # Erwartete Felder: interest (=Short-POSITION-Shares), settlementDate,
          # avgDailyShareVolume, daysToCover, percentChange — mit Historie (Rows).
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
          for T in AMC IONQ; do
            URL="https://api.nasdaq.com/api/quote/$T/short-interest?assetclass=stocks"
            echo "==================================================="
            echo "NASDAQ  TICKER=$T"
            echo "URL: $URL"
            curl -sS --max-time 25 "$URL" \
              -H "User-Agent: $UA" \
              -H "Accept: application/json" \
              -o "$OUT_DIR/C_nasdaq_$T.json" \
              -w "HTTP_STATUS=%{http_code} SIZE=%{size_download} REMOTE_IP=%{remote_ip}\n" 2>&1 || true
            echo "----- body (erste 3000 Zeichen) -----"
            head -c 3000 "$OUT_DIR/C_nasdaq_$T.json" || true
            echo
            echo "----- Feld-Checks (3 Fragen) -----"
            grep -o '"interest"' "$OUT_DIR/C_nasdaq_$T.json" | head -1 \
              && echo "→ 1) POSITION 'interest' (Short-Shares) present" \
              || echo "→ 1) 'interest' NICHT gefunden"
            grep -o 'settlementDate' "$OUT_DIR/C_nasdaq_$T.json" | head -1 \
              && echo "→ 3) settlementDate present" || echo "→ 3) settlementDate NICHT gefunden"
            grep -o "$T" "$OUT_DIR/C_nasdaq_$T.json" | head -1 \
              && echo "→ 2) $T ENTHALTEN" || echo "→ 2) $T NICHT enthalten (leer?)"
            echo "----- Historie-Tiefe (settlementDate-Vorkommen = Anzahl Reports) -----"
            grep -o 'settlementDate' "$OUT_DIR/C_nasdaq_$T.json" | wc -l || true
          done

      # ═══════════════ QUELLE 3: FINNHUB (nur mit GH-Secret-Key) ═══════════════
      - name: Probe D — Finnhub Short-Interest (AMC / IONQ) — nur falls Key vorhanden
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          set +e
          if [ -z "$FINNHUB_API_KEY" ]; then
            echo "→ FINNHUB_API_KEY nicht als GH-Secret gesetzt — Probe D ÜBERSPRUNGEN."
            echo "  (Kein Key committet/hartcodiert. Finnhub-SI ist Premium; ohne"
            echo "   Key kein Call. Sauberer Skip, KEIN Fehler.)"
            exit 0
          fi
          echo "→ FINNHUB_API_KEY vorhanden (Länge ${#FINNHUB_API_KEY}) — Call OHNE Key-Ausgabe."
          for T in AMC IONQ; do
            # Finnhub SI-Endpoint. Token NUR in der echten URL, im Log maskiert.
            # curl -sS (NICHT -v) → URL mit Token wird nicht geloggt.
            URL="https://finnhub.io/api/v1/stock/short-interest?symbol=$T&token=$FINNHUB_API_KEY"
            echo "==================================================="
            echo "FINNHUB  TICKER=$T"
            echo "URL: https://finnhub.io/api/v1/stock/short-interest?symbol=$T&token=***"
            curl -sS --max-time 25 "$URL" \
              -H "Accept: application/json" \
              -o "$OUT_DIR/D_finnhub_$T.json" \
              -w "HTTP_STATUS=%{http_code} SIZE=%{size_download}\n" 2>&1 || true
            echo "----- body (erste 3000 Zeichen) -----"
            head -c 3000 "$OUT_DIR/D_finnhub_$T.json" || true
            echo
            echo "----- Feld-Checks (3 Fragen) -----"
            grep -oE '"shortInterest"|short_interest' "$OUT_DIR/D_finnhub_$T.json" | head -1 \
              && echo "→ 1) POSITION Short-Interest-Feld present" \
              || echo "→ 1) Short-Interest-Feld NICHT gefunden (evtl. falscher Pfad/Premium)"
            grep -oE 'settlementDate|"date"' "$OUT_DIR/D_finnhub_$T.json" | head -1 \
              && echo "→ 3) Datums-Feld present" || echo "→ 3) Datums-Feld NICHT gefunden"
            grep -o "$T" "$OUT_DIR/D_finnhub_$T.json" | head -1 \
              && echo "→ 2) $T ENTHALTEN" || echo "→ 2) $T NICHT enthalten"
          done

      - name: Auswertungs-Hinweis (im Log) — 3 Quellen, gleiche 3 Fragen
        run: |
          echo "===== ABLESEN — pro Quelle dieselben 3 Fragen ====="
          echo "1) POSITION (Bestand, nicht Volumen)?"
          echo "   FINRA: currentShortShareNumber | Nasdaq: interest | Finnhub: shortInterest"
          echo "2) COVERAGE (K.o.): AMC/IONQ (NASDAQ) enthalten mit Zahlen — oder leer?"
          echo "   Leer/OTC-only für NASDAQ = Quelle wertlos fürs Universum."
          echo "3) settlement-datiert (Basis für #408 pub_date = settlement+7)?"
          echo "   + Historie-Tiefe (Anzahl settlementDate-Reports pro Ticker)."
          echo
          echo "AUTH-Ausweis (nicht umgangen):"
          echo "  FINRA  Probe A HTTP 401/403 → kostenloser API-Console-Account nötig."
          echo "  Nasdaq Probe C HTTP 403     → Bot-/UA-Block (evtl. Header-Feintuning)."
          echo "  Finnhub Probe D übersprungen → kein GH-Secret-Key gesetzt."

      - name: Upload raw responses als Artefakt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: finra-si-probe-raw
          path: ${{ github.workspace }}/finra-probe-out
          retention-days: 7
