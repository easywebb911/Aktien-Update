name: EDGAR Feasibility Probe (§6c, read-only, WEGWERF)

# ─────────────────────────────────────────────────────────────────────────────
# WEGWERF-DIAGNOSE — Machbarkeits-Probe für §6c (FDA-Katalysator aus SEC-EDGAR-8-K).
# Läuft NUR per workflow_dispatch, vom Branch `probe/edgar` (NICHT main).
# Schreibt NICHTS ins Repo — reine Konsolen-Logs. Kein Commit, kein Artefakt.
# Kein Merge-Kandidat. Nach Auswertung: Branch löschen (nimmt diese Datei mit).
#
# Shell bewusst `bash --noprofile --norc {0}` (OHNE `-eo pipefail`): die drei
# Probe-Blöcke sind so geschrieben, dass ein harmloser `[ ] && echo`-Exit-1 den
# Step NICHT abbrechen soll — reine Robustheit, keine Logik-Änderung an den Blöcken.
#
# Voraussetzung: Repo-Secret EDGAR_USER_AGENT (bereits von den Produktions-
# Workflows genutzt). Fehlt es, zeigt das Log `UA=REPLACE_ME your-email@example.com`.
# ─────────────────────────────────────────────────────────────────────────────

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  edgar-probe:
    name: EDGAR keyless read-only probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (für backtest_history.json in Block 1b)
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Block 1 — CIK-Auflösung (1a heute vs. 1b historisch)
        shell: bash --noprofile --norc {0}
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          UA="${EDGAR_USER_AGENT:-REPLACE_ME your-email@example.com}"
          echo "UA=$UA"
          [ "$UA" = "REPLACE_ME your-email@example.com" ] && echo "⚠ EDGAR_USER_AGENT nicht gesetzt — Platzhalter ersetzen!"

          # 1x fetch der offiziellen Ticker→CIK-Map (nur AKTUELLE Ticker — genau das ist der 1b-Test)
          curl -sS -H "User-Agent: $UA" https://www.sec.gov/files/company_tickers.json -o /tmp/ct.json
          echo "company_tickers.json bytes: $(wc -c </tmp/ct.json)  (leer/HTML = Zugriff verweigert)"
          jq -r '.[] | [(.ticker|ascii_upcase),(.cik_str|tostring),.title] | @tsv' /tmp/ct.json > /tmp/ctmap.tsv
          echo "map-Einträge (aktuelle Ticker gesamt): $(wc -l </tmp/ctmap.tsv)"

          resolve () {   # $1=label $2=full|summary  danach: Ticker...
            local label="$1" verbose="$2"; shift 2
            local total=0 hit=0 amb=0
            echo "── $label ──"
            for raw in "$@"; do
              t=$(printf '%s' "$raw" | tr '[:lower:]' '[:upper:]')
              total=$((total+1))
              n=$(awk -F'\t' -v k="$t" '$1==k' /tmp/ctmap.tsv | wc -l)
              if [ "$n" -eq 0 ]; then
                echo "  MISS  $t  (nicht in company_tickers.json — delistet/OTC/ausländisch?)"
              else
                hit=$((hit+1))
                if [ "$n" -gt 1 ]; then
                  amb=$((amb+1)); echo "  ⚠AMB  $t  ($n Einträge):"
                  awk -F'\t' -v k="$t" '$1==k{printf "        CIK %s  %s\n",$2,$3}' /tmp/ctmap.tsv
                elif [ "$verbose" = "full" ]; then
                  awk -F'\t' -v k="$t" '$1==k{printf "  OK    %s → CIK %s  %s\n",$1,$2,$3}' /tmp/ctmap.tsv
                fi
              fi
            done
            echo "  → aufgelöst $hit/$total   (mehrdeutig: $amb)"
          }

          # (1a) heutige Watchlist-Stichprobe (gemischt Pharma / Non-Pharma) — alle Zeilen
          resolve "1a heutige Watchlist" full LENZ ANAB CADL REPL TNXP ZBIO WOLF AI IONQ AMC PDYN GPRE SG

          # (1b) HISTORISCHE Entry-Ticker aus dem Repo-Backtest (inkl. delistet/umbenannt) — nur MISS/AMB + Quote
          mapfile -t HIST < <(jq -r '.[].ticker' backtest_history.json | sort -u)
          echo "distinct historische Ticker in backtest_history.json: ${#HIST[@]}"
          resolve "1b historische Entry-Ticker (nur MISS/AMB gelistet)" summary "${HIST[@]}"

      - name: Block 2 — Full-Text-Exhibit-Trefferbarkeit
        shell: bash --noprofile --norc {0}
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          UA="${EDGAR_USER_AGENT:-REPLACE_ME your-email@example.com}"
          enc () { jq -rn --arg s "$1" '("\"" + $s + "\"")|@uri'; }   # exakte Phrase, URL-kodiert (mit Quotes)

          echo "### RAW erster Treffer — Feldnamen-Kontrolle (nicht annehmen, welches Feld Exhibit markiert) ###"
          curl -sS -H "User-Agent: $UA" \
            "https://efts.sec.gov/LATEST/search-index?q=$(enc 'U.S. Food and Drug Administration has approved')&forms=8-K" \
            | jq '.hits.hits[0]'
          echo

          probe () {   # $1 = Phrase
            local P="$1" E; E=$(enc "$P")
            echo "════ efts  q=\"$P\"  forms=8-K ════"
            J=$(curl -sS -H "User-Agent: $UA" "https://efts.sec.gov/LATEST/search-index?q=${E}&forms=8-K")
            echo "$J" | jq -r '"total hits: \(.hits.total.value // 0)"'
            echo "  ── erste 8 Treffer (ft=Dokumenttyp: 8-K=Mantel, EX-99.x=Exhibit) ──"
            echo "$J" | jq -r '.hits.hits[:8][] | "  ft=\(._source.file_type)  root=\(._source.root_form)  date=\(._source.file_date)  id=\(._id)  \(._source.display_names[0])"'
            echo "  ── file_type-Verteilung über alle zurückgegebenen Treffer ──"
            echo "$J" | jq -r '.hits.hits[]._source.file_type' | sort | uniq -c | sort -rn
            sleep 1
          }

          # generische FDA-Approval-Phrase (steht typisch im EX-99.1-Pressetext, nicht im 8-K-Mantel):
          probe 'U.S. Food and Drug Administration has approved'
          # verifizierbarer Marken-Anker (Sarepta ELEVIDYS-Zulassung, 8-K Juni 2023, PR in EX-99.1):
          probe 'ELEVIDYS'

      - name: Block 3 — Small-Cap-Submissions + Zwei-Zeitstempel-Realität
        shell: bash --noprofile --norc {0}
        env:
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
        run: |
          UA="${EDGAR_USER_AGENT:-REPLACE_ME your-email@example.com}"
          [ -s /tmp/ct.json ] || curl -sS -H "User-Agent: $UA" https://www.sec.gov/files/company_tickers.json -o /tmp/ct.json

          for T in LENZ ANAB TNXP; do   # aufgelöste Biotech-Small-Caps aus 1a
            CIK=$(jq -r --arg t "$T" '.[] | select((.ticker|ascii_upcase)==$t) | .cik_str' /tmp/ct.json | head -1)
            if [ -z "$CIK" ] || [ "$CIK" = "null" ]; then echo "$T: keine CIK — skip"; continue; fi
            PAD=$(printf "CIK%010d" "$CIK")
            echo "════ $T  CIK=$CIK  ($PAD) ════"
            sleep 1
            S=$(curl -sS -H "User-Agent: $UA" "https://data.sec.gov/submissions/$PAD.json")
            echo "  name: $(echo "$S" | jq -r '.name // "?"')   tickers: $(echo "$S" | jq -c '.tickers // []')   exchanges: $(echo "$S" | jq -c '.exchanges // []')"
            echo "  ── jüngste 3× 8-K (Roh-Records) ──"
            echo "$S" | jq -r '.filings.recent as $r
              | [range(0; ($r.form|length)) | select($r.form[.]=="8-K")] as $idx
              | "  (8-K in recent: \($idx|length))",
                ($idx[0:3][] as $i
                  | "  accept=\($r.acceptanceDateTime[$i])  filed=\($r.filingDate[$i])  report=\($r.reportDate[$i])  doc=\($r.primaryDocument[$i])")'
            # Δ acceptance vs. reportDate am jüngsten 8-K (quantifiziert die "8-K verzögert"-Dämpfung)
            A=$(echo "$S" | jq -r '.filings.recent as $r | ([range(0;($r.form|length))|select($r.form[.]=="8-K")][0]) as $i | ($r.acceptanceDateTime[$i] // "")')
            P=$(echo "$S" | jq -r '.filings.recent as $r | ([range(0;($r.form|length))|select($r.form[.]=="8-K")][0]) as $i | ($r.reportDate[$i] // "")')
            if [ -n "$A" ] && [ -n "$P" ] && [ "$P" != "null" ]; then
              ad=$(date -u -d "${A%%T*}" +%s 2>/dev/null); pd=$(date -u -d "$P" +%s 2>/dev/null)
              if [ -n "$ad" ] && [ -n "$pd" ]; then echo "  Δ jüngstes 8-K: accept=$A  report=$P  → $(( (ad-pd)/86400 )) Tage"; fi
            else
              echo "  Δ jüngstes 8-K: report leer (8-K ohne period_ending) — accept=$A"
            fi
          done
