name: Diagnose Provider Probe (read-only)

# Read-only curl-Probe gegen die vier Provider-Endpoints, die seit
# 15.05.2026 100% Fail-Rate im provider_health.jsonl zeigen
# (finviz, SEC browse-edgar, stocktwits, earningswhispers).
#
# KEINE Code-Pfade aus dem Tool werden aufgerufen — reines curl in bash.
# KEINE Secrets verwendet. KEINE Repo-Writes.
#
# Trigger ausschließlich workflow_dispatch (manuell).
# Output landet komplett im Run-Log und in einem Artefakt.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      CHROME_UA: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"
      ACCEPT_LANG: "en-US,en;q=0.9"
      OUT_DIR: ${{ github.workspace }}/probe-out

    steps:
      - name: Prepare output dir
        run: mkdir -p "$OUT_DIR"

      - name: Runner egress info (IP + DNS)
        run: |
          echo "## Runner public IP"
          curl -sS --max-time 5 https://api.ipify.org || true
          echo
          echo
          echo "## DNS resolution"
          for h in finviz.com www.sec.gov api.stocktwits.com www.earningswhispers.com; do
            echo "- $h"
            getent hosts "$h" || echo "  (kein Eintrag)"
          done

      - name: Probe 1 — finviz screener v141
        run: |
          set +e
          URL="https://finviz.com/screener.ashx?v=141&f=sh_short_o15,sh_price_o1&o=-shortfloat&r=1"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "Accept-Language: $ACCEPT_LANG"
          echo "----- verbose -----"
          curl -v --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/01_finviz_body.bin" \
            -D "$OUT_DIR/01_finviz_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nSSL_VERIFY_RESULT=%{ssl_verify_result}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/01_finviz_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/01_finviz_body.bin" || true
          echo
          echo "----- body byte count -----"
          wc -c "$OUT_DIR/01_finviz_body.bin" || true

      - name: Probe 2a — SEC browse-edgar (8-K IONQ) mit aktuellem SEC_HEADERS-UA
        run: |
          set +e
          URL="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=IONQ&type=8-K&dateb=&owner=include&count=5&search_text=&output=atom"
          SEC_UA="SqueezeReport/1.0 github-actions@squeeze-report.com"
          echo "URL: $URL"
          echo "User-Agent: $SEC_UA   (aktuell in config.py:903)"
          echo "----- verbose -----"
          curl -v --max-time 12 \
            -H "User-Agent: $SEC_UA" \
            -o "$OUT_DIR/02a_sec_body.bin" \
            -D "$OUT_DIR/02a_sec_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/02a_sec_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/02a_sec_body.bin" || true
          echo

      - name: Probe 2b — SEC browse-edgar (8-K IONQ) mit SEC-konformem UA
        run: |
          set +e
          URL="https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK=IONQ&type=8-K&dateb=&owner=include&count=5&search_text=&output=atom"
          SEC_UA="Easy Webb easy@example.com"
          echo "URL: $URL"
          echo "User-Agent: $SEC_UA   (SEC-konformes Format Name + Email)"
          echo "----- verbose -----"
          curl -v --max-time 12 \
            -H "User-Agent: $SEC_UA" \
            -o "$OUT_DIR/02b_sec_body.bin" \
            -D "$OUT_DIR/02b_sec_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/02b_sec_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/02b_sec_body.bin" || true
          echo

      - name: Probe 3 — Stocktwits AMC stream
        run: |
          set +e
          URL="https://api.stocktwits.com/api/2/streams/symbol/AMC.json"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "Accept-Language: $ACCEPT_LANG"
          echo "----- verbose -----"
          curl -v --max-time 5 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/03_stocktwits_body.bin" \
            -D "$OUT_DIR/03_stocktwits_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/03_stocktwits_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/03_stocktwits_body.bin" || true
          echo

      - name: Probe 4 — EarningsWhispers RSS
        run: |
          set +e
          URL="https://www.earningswhispers.com/rss/earningscalendar.asp"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "Accept-Language: $ACCEPT_LANG"
          echo "----- verbose -----"
          curl -v --max-time 10 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/04_earningswhispers_body.bin" \
            -D "$OUT_DIR/04_earningswhispers_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/04_earningswhispers_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/04_earningswhispers_body.bin" || true
          echo
          echo "----- item count (grep <item>) -----"
          grep -c "<item" "$OUT_DIR/04_earningswhispers_body.bin" || true

      # ─────────────────────────────────────────────────────────────────────
      # Probe 2 — finviz Parser-Drift-Check (URL-Migration .ashx → neu)
      #
      # Live-Probe 18.05.2026 zeigte: `screener.ashx` → HTTP 301 zum neuen
      # Pfad. Die offene Frage ist nicht „läuft der Redirect", sondern
      # „ist das Markup nach dem Redirect noch parsebar für unsere
      # BS4-Table-Heuristik und die `quote.ashx?t=`-Regex". Probes 5-8
      # holen die Ziel-Bodies + sniffen typische Hydration-/HTML-Marker.
      # ─────────────────────────────────────────────────────────────────────

      - name: Probe 5 — finviz Screener neu (/screener, ohne .ashx)
        run: |
          set +e
          URL="https://finviz.com/screener?v=141&f=sh_short_o15,sh_price_o1&o=-shortfloat&r=1"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/05_finviz_screener_new_body.bin" \
            -D "$OUT_DIR/05_finviz_screener_new_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers (incl. redirect chain) -----"
          cat "$OUT_DIR/05_finviz_screener_new_headers.txt" || true
          echo "----- body (first 5000 chars) -----"
          head -c 5000 "$OUT_DIR/05_finviz_screener_new_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  __NEXT_DATA__ hits: $(grep -c "__NEXT_DATA__" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  <table hits:       $(grep -c "<table" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  tr class hits:     $(grep -c "tr class" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  data-key hits:     $(grep -c "data-key" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  quote.ashx?t= hits: $(grep -c "quote\.ashx?t=" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  /quote/ hits:      $(grep -c "/quote/" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  Short Float hits:  $(grep -c "Short Float" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  Float Short hits:  $(grep -c "Float Short" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  SF  hits:          $(grep -c "SF " "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  short_float hits:  $(grep -c "short_float" "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/05_finviz_screener_new_body.bin" 2>/dev/null || echo 0)"

      - name: Inspect 5a — href-Patterns im Screener-Body (unique, max 50)
        run: |
          set +e
          BODY="$OUT_DIR/05_finviz_screener_new_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 5 hat nicht gefetched)"
            exit 0
          fi
          echo "----- Erste 50 unique href-Werte im Screener-Body -----"
          grep -oE 'href="[^"]*"' "$BODY" | sort -u | head -50

      - name: Inspect 5b — Ticker-Header-Zeile + erste Datenzeile (Kontext ±5 lines)
        run: |
          set +e
          BODY="$OUT_DIR/05_finviz_screener_new_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 5 hat nicht gefetched)"
            exit 0
          fi
          echo "----- Kontext um 'Ticker' (erste 20 Zeilen, +5 nach Match) -----"
          grep -E "Ticker" "$BODY" -A 5 | head -20

      - name: Probe 6 — finviz Quote-Page neu (/quote/AMC, ohne .ashx)
        run: |
          set +e
          URL="https://finviz.com/quote/AMC"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/06_finviz_quote_new_body.bin" \
            -D "$OUT_DIR/06_finviz_quote_new_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers (incl. redirect chain) -----"
          cat "$OUT_DIR/06_finviz_quote_new_headers.txt" || true
          echo "----- body (first 5000 chars) -----"
          head -c 5000 "$OUT_DIR/06_finviz_quote_new_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  __NEXT_DATA__ hits: $(grep -c "__NEXT_DATA__" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  <table hits:       $(grep -c "<table" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  tr class hits:     $(grep -c "tr class" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  data-key hits:     $(grep -c "data-key" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  quote.ashx?t= hits: $(grep -c "quote\.ashx?t=" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  Short Float hits:  $(grep -c "Short Float" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  Float Short hits:  $(grep -c "Float Short" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  SF  hits:          $(grep -c "SF " "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  short_float hits:  $(grep -c "short_float" "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/06_finviz_quote_new_body.bin" 2>/dev/null || echo 0)"

      - name: Probe 7 — finviz Quote-Page alt (quote.ashx?t=AMC, Vergleichs-Probe)
        run: |
          set +e
          URL="https://finviz.com/quote.ashx?t=AMC"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/07_finviz_quote_ashx_body.bin" \
            -D "$OUT_DIR/07_finviz_quote_ashx_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers (incl. redirect chain) -----"
          cat "$OUT_DIR/07_finviz_quote_ashx_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/07_finviz_quote_ashx_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  __NEXT_DATA__ hits: $(grep -c "__NEXT_DATA__" "$OUT_DIR/07_finviz_quote_ashx_body.bin" 2>/dev/null || echo 0)"
          echo "  <table hits:       $(grep -c "<table" "$OUT_DIR/07_finviz_quote_ashx_body.bin" 2>/dev/null || echo 0)"
          echo "  quote.ashx?t= hits: $(grep -c "quote\.ashx?t=" "$OUT_DIR/07_finviz_quote_ashx_body.bin" 2>/dev/null || echo 0)"
          echo "  Short Float hits:  $(grep -c "Short Float" "$OUT_DIR/07_finviz_quote_ashx_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/07_finviz_quote_ashx_body.bin" 2>/dev/null || echo 0)"

      - name: Inspect 7a — Short Float Cell-Markup-Kontext (±200 chars um den ersten Match)
        run: |
          set +e
          BODY="$OUT_DIR/07_finviz_quote_ashx_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 7 hat nicht gefetched)"
            exit 0
          fi
          echo "----- '>Short Float<' raw matches (max 3) -----"
          grep -oE ">Short Float<" "$BODY" | head -3
          echo
          echo "----- 600 chars Kontext um den ersten Short-Float-Match -----"
          pos=$(grep -boE ">Short Float<" "$BODY" 2>/dev/null | head -1 | cut -d: -f1)
          if [ -n "$pos" ]; then
            start=$((pos > 200 ? pos - 200 : 0))
            dd if="$BODY" bs=1 skip="$start" count=600 2>/dev/null
            echo
            echo "(Match-Offset im Body: $pos, dumped 600 chars ab Offset $start)"
          else
            echo "(kein '>Short Float<'-Match — Label-Form hat sich geändert)"
          fi

      - name: Inspect 7b — href-Patterns im Quote-Body (unique, max 50)
        run: |
          set +e
          BODY="$OUT_DIR/07_finviz_quote_ashx_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 7 hat nicht gefetched)"
            exit 0
          fi
          echo "----- Erste 50 unique href-Werte im Quote-Body -----"
          grep -oE 'href="[^"]*"' "$BODY" | sort -u | head -50

      - name: Probe 8 — finviz RSS (rss.ashx?t=AMC, News-Pfad-Status)
        run: |
          set +e
          URL="https://finviz.com/rss.ashx?t=AMC"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/08_finviz_rss_body.bin" \
            -D "$OUT_DIR/08_finviz_rss_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/08_finviz_rss_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/08_finviz_rss_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  <item hits:        $(grep -c "<item" "$OUT_DIR/08_finviz_rss_body.bin" 2>/dev/null || echo 0)"
          echo "  <rss hits:         $(grep -c "<rss" "$OUT_DIR/08_finviz_rss_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/08_finviz_rss_body.bin" 2>/dev/null || echo 0)"

      # ─────────────────────────────────────────────────────────────────────
      # Probe 3 — finviz Screener Pagination-Verhalten
      #
      # Probe-3-Inspect hat zwei Sniff-Befunde:
      #   - Screener-Body enthält 0× `quote.ashx?t=` und 0× `/quote/`
      #   - Hypothese: neue Form ist `quote?t=TICKER` (passt zum 301-Pattern)
      # Plus: aktueller Produktions-Fetcher nutzt `&r=1` (1-basierte Seite).
      # Diese Probes klären: a) findet sich `quote?t=`-Pattern überhaupt im
      # Body, b) funktioniert Pagination ohne r-Param und mit r=21 (zweite
      # Seite klassisches 20-pro-Seite-Schema).
      # ─────────────────────────────────────────────────────────────────────

      - name: Probe 9 — finviz Screener OHNE r-Param
        run: |
          set +e
          URL="https://finviz.com/screener?v=141&f=sh_short_o15,sh_price_o1&o=-shortfloat"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/09_screener_no_r_body.bin" \
            -D "$OUT_DIR/09_screener_no_r_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers (incl. redirect chain) -----"
          cat "$OUT_DIR/09_screener_no_r_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/09_screener_no_r_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  <table hits:       $(grep -c "<table" "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"
          echo "  tr class hits:     $(grep -c "tr class" "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"
          echo "  quote?t= hits:     $(grep -c "quote?t=" "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"
          echo "  quote.ashx?t= hits: $(grep -c "quote\.ashx?t=" "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"
          echo "  Short Float hits:  $(grep -c "Short Float" "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/09_screener_no_r_body.bin" 2>/dev/null || echo 0)"

      - name: Probe 10 — finviz Screener mit r=21 (zweite Seite, 20-pro-Seite-Schema)
        run: |
          set +e
          URL="https://finviz.com/screener?v=141&f=sh_short_o15,sh_price_o1&o=-shortfloat&r=21"
          echo "URL: $URL"
          echo "User-Agent: $CHROME_UA"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 30 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/10_screener_r21_body.bin" \
            -D "$OUT_DIR/10_screener_r21_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers (incl. redirect chain) -----"
          cat "$OUT_DIR/10_screener_r21_headers.txt" || true
          echo "----- body (first 1000 chars) -----"
          head -c 1000 "$OUT_DIR/10_screener_r21_body.bin" || true
          echo
          echo "----- markup-sniff -----"
          echo "  <table hits:       $(grep -c "<table" "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"
          echo "  tr class hits:     $(grep -c "tr class" "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"
          echo "  quote?t= hits:     $(grep -c "quote?t=" "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"
          echo "  quote.ashx?t= hits: $(grep -c "quote\.ashx?t=" "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"
          echo "  Short Float hits:  $(grep -c "Short Float" "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$OUT_DIR/10_screener_r21_body.bin" 2>/dev/null || echo 0)"

      - name: Inspect 9a — quote?t=-hrefs im Screener-Body OHNE r-Param (max 30 unique)
        run: |
          set +e
          BODY="$OUT_DIR/09_screener_no_r_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 9 hat nicht gefetched)"
            exit 0
          fi
          echo "----- Erste 30 unique 'quote?t='-href-Werte -----"
          grep -oE 'href="[^"]*quote\?t=[^"]*"' "$BODY" | sort -u | head -30

      - name: Inspect 10a — quote?t=-hrefs im Screener-Body mit r=21 (max 30 unique)
        run: |
          set +e
          BODY="$OUT_DIR/10_screener_r21_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 10 hat nicht gefetched)"
            exit 0
          fi
          echo "----- Erste 30 unique 'quote?t='-href-Werte -----"
          grep -oE 'href="[^"]*quote\?t=[^"]*"' "$BODY" | sort -u | head -30

      # ─────────────────────────────────────────────────────────────────────
      # Probe 4 — stocktwits Burst + earningswhispers URL-Discovery
      #
      # Stocktwits: Diagnose-Hypothese A „Burst-Rate-Limit". Production
      # macht 14 parallele Calls via ThreadPoolExecutor(max_workers=10).
      # Hier 5 schnelle sequentielle Calls — wenn 1× 200 dann 4× 429,
      # bestätigt Burst-Limit. Wenn alle 5× 429/403, dann Auth-Wall.
      #
      # EarningsWhispers: alter .asp-Endpoint tot. Homepage-Sniff +
      # 4 Kandidat-URLs für RSS/iCal/JSON-API-Replacement.
      # ─────────────────────────────────────────────────────────────────────

      - name: Probe 11 — Stocktwits Burst-Test (5 schnelle Calls, kein sleep)
        run: |
          set +e
          echo "Hypothese: Production hat 14 parallele Calls → Burst-Limit?"
          echo "Test: 5 sequentielle Calls in rapider Folge, kein Sleep."
          echo
          BURST_DIR="$OUT_DIR/11_stocktwits_burst"
          mkdir -p "$BURST_DIR"
          declare -A STATUS_COUNT
          for sym in AMC IONQ RR CRMD NVDA; do
            URL="https://api.stocktwits.com/api/2/streams/symbol/${sym}.json"
            STATUS=$(curl -sS --max-time 5 \
              -H "User-Agent: $CHROME_UA" \
              -H "Accept-Language: $ACCEPT_LANG" \
              -o "$BURST_DIR/${sym}_body.bin" \
              -D "$BURST_DIR/${sym}_headers.txt" \
              -w "%{http_code}|%{time_total}|%{size_download}" \
              "$URL" 2>/dev/null)
            http=$(echo "$STATUS" | cut -d'|' -f1)
            time_s=$(echo "$STATUS" | cut -d'|' -f2)
            bytes=$(echo "$STATUS" | cut -d'|' -f3)
            echo "  $sym → HTTP $http  time=${time_s}s  bytes=$bytes"
            # Rate-Limit-Header capturen wenn vorhanden
            for h in "Retry-After" "X-RateLimit-Limit" "X-RateLimit-Remaining" "X-RateLimit-Reset" "X-Rate-Limit-Limit" "X-Rate-Limit-Remaining" "X-Rate-Limit-Reset"; do
              val=$(grep -i "^$h:" "$BURST_DIR/${sym}_headers.txt" 2>/dev/null | head -1 | sed 's/\r$//')
              if [ -n "$val" ]; then
                echo "    [$sym] $val"
              fi
            done
          done
          echo
          echo "----- Status-Count über 5 Calls -----"
          for sym in AMC IONQ RR CRMD NVDA; do
            grep -m1 -oE "HTTP/[12]\.?[0-9]? [0-9]{3}" "$BURST_DIR/${sym}_headers.txt" 2>/dev/null | head -1
          done | sort | uniq -c | sort -rn
          echo
          echo "----- Body-Snippet pro Symbol (erste 300 chars) -----"
          for sym in AMC IONQ RR CRMD NVDA; do
            echo "--- $sym ---"
            head -c 300 "$BURST_DIR/${sym}_body.bin" 2>/dev/null
            echo
          done

      - name: Probe 12 — EarningsWhispers Homepage URL-Discovery
        run: |
          set +e
          URL="https://www.earningswhispers.com/"
          echo "URL: $URL"
          echo "----- verbose -----"
          curl -v -L --max-filesize 1048576 --max-time 15 \
            -H "User-Agent: $CHROME_UA" \
            -H "Accept-Language: $ACCEPT_LANG" \
            -o "$OUT_DIR/12_ew_home_body.bin" \
            -D "$OUT_DIR/12_ew_home_headers.txt" \
            -w "\n----- summary -----\nHTTP_STATUS=%{http_code}\nSIZE_DOWNLOAD=%{size_download}\nTIME_TOTAL=%{time_total}\nREMOTE_IP=%{remote_ip}\nNUM_REDIRECTS=%{num_redirects}\nEFFECTIVE_URL=%{url_effective}\n" \
            "$URL" 2>&1 || true
          echo
          echo "----- response headers -----"
          cat "$OUT_DIR/12_ew_home_headers.txt" || true
          echo
          BODY="$OUT_DIR/12_ew_home_body.bin"
          if [ ! -s "$BODY" ]; then
            echo "(Body leer oder fehlt — Probe 12 hat nicht gefetched)"
            exit 0
          fi
          echo "----- markup-sniff -----"
          echo "  <rss hits:         $(grep -c "<rss" "$BODY" 2>/dev/null || echo 0)"
          echo "  link rel=alternate hits: $(grep -ciE 'link[^>]*rel=\"alternate\"' "$BODY" 2>/dev/null || echo 0)"
          echo "  body byte count:   $(wc -c < "$BODY" 2>/dev/null || echo 0)"
          echo
          echo "----- href= mit feed/rss/calendar/api/.ics (unique, max 30) -----"
          grep -oE 'href="[^"]*(feed|rss|calendar|api|\.ics)[^"]*"' "$BODY" | sort -u | head -30
          echo
          echo "----- <link rel=alternate>-Tags (unique, max 15) -----"
          grep -oiE '<link[^>]*rel="alternate"[^>]*>' "$BODY" | sort -u | head -15

      - name: Probe 13 — EarningsWhispers 4 Kandidat-URLs
        run: |
          set +e
          for path in "/calendar" "/feeds/calendar" "/api/calendar" "/iCalendar/calendar.ics"; do
            URL="https://www.earningswhispers.com${path}"
            slug=$(echo "$path" | tr '/.' '__')
            HDR_FILE="$OUT_DIR/13_ew_candidate${slug}_headers.txt"
            BODY_FILE="$OUT_DIR/13_ew_candidate${slug}_body.bin"
            echo "=== Probing: $URL ==="
            STATUS=$(curl -sS -L --max-filesize 1048576 --max-time 10 \
              -H "User-Agent: $CHROME_UA" \
              -H "Accept-Language: $ACCEPT_LANG" \
              -o "$BODY_FILE" \
              -D "$HDR_FILE" \
              -w "HTTP_STATUS=%{http_code}|TIME=%{time_total}|SIZE=%{size_download}|EFFECTIVE_URL=%{url_effective}|NUM_REDIRECTS=%{num_redirects}" \
              "$URL" 2>/dev/null)
            echo "  $STATUS"
            content_type=$(grep -i "^content-type:" "$HDR_FILE" 2>/dev/null | head -1 | sed 's/\r$//')
            echo "  $content_type"
            echo "  ----- body (first 200 chars) -----"
            head -c 200 "$BODY_FILE" 2>/dev/null
            echo
            echo
          done

      - name: Upload raw probe artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-probe-raw
          path: ${{ env.OUT_DIR }}/
          retention-days: 7
