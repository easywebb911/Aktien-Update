name: Daily Squeeze Report

on:
  schedule:
    # 07:00 UTC = 09:00 CEST (Sommer, UTC+2) / 08:00 CET (Winter, UTC+1)
    # Nur Handelstage Mo–Fr
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # Manueller Start jederzeit möglich

permissions:
  contents: write   # Benötigt um index.html in main zu commiten

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate squeeze report
        env:
          FINRA_API_TOKEN: ${{ secrets.FINRA_API_TOKEN }}
        run: python generate_report.py

      - name: Commit and publish report
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.html
          if git diff --staged --quiet; then
            echo "Keine Aenderungen – Report ist aktuell."
            exit 0
          fi
          git commit -m "Daily squeeze report $(date -u '+%Y-%m-%d')"
          # Pull rebase before push to handle concurrent workflow runs
          git pull --rebase origin main
          git push origin main
