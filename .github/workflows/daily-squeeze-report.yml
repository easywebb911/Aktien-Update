name: Daily Squeeze Report

on:
  schedule:
    # Zwei-Run-Architektur (seit 12.05.2026):
    #
    # 10:17 UTC = 12:17 CEST / 11:17 CET — `premarket`-Run, ~3,2h
    # vor US-Open. Liefert Vorschau mit noch nicht final konsolidierten
    # Tagesdaten (RVOL strukturell unter-skaliert). Anomaly-Pushes laufen
    # in dieser Phase (Aktions-Fenster), Backtest-History wird hier
    # NICHT befüllt.
    #
    # Minute-17-Offset (statt :00) gegen GitHub-Actions-Load-Peak-Drops
    # zur vollen Stunde (analog ki_agent.yml PR #143). Beleg: 14.05.2026
    # 10:00-UTC-Cron komplett ausgefallen.
    - cron: '17 10 * * 1-5'
    # 21:17 UTC = 23:17 CEST / 22:17 CET — `postclose`-Run, ~47min nach
    # US-Close. Liefert EOD-konsolidierte Daten = die „Wahrheit". Backtest-
    # History bekommt einen Eintrag pro Top-10-Ticker; Anomaly-Pushes
    # bleiben aus (kein abendliches Rauschen aufs Handy).
    - cron: '17 21 * * 1-5'
  workflow_dispatch:   # Manueller Start jederzeit möglich
    inputs:
      run_phase:
        description: >-
          WICHTIG: 'premarket' während US-Session (13:30–20:00 UTC,
          Vorschau ohne Backtest-Append). 'postclose' NUR nach US-Close
          (≥20:00 UTC, EOD-konsolidiert, schreibt Backtest-Eintrag).
          Plausibilitäts-Override aktiv — falscher Input wird mit
          Warnung im Run-Log korrigiert (siehe scripts/resolve_run_phase.py).
        required: true
        type: choice
        options:
          - premarket
          - postclose

permissions:
  contents: write   # Benötigt um index.html in main zu commiten
  actions:  write   # Benötigt um ki_agent.yml am Ende zu triggern

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint chat template
        run: python scripts/lint_chat_template.py

      - name: Lint JS-format escape
        # Fängt unescapte ``{...}``-Pattern im f-String von
        # generate_html_v1 (JS-Code, JS-Kommentare, JS-Destructuring).
        # Hintergrund: PR #138 — siehe scripts/lint_jsformat_escape.py.
        run: python scripts/lint_jsformat_escape.py

      - name: Lint score-confidence isolation
        # Stellt sicher, dass die rein anzeigenden Score-Konfidenz-Stufen
        # NICHT in Score-/Conviction-Berechnungs-Pfaden gelesen werden
        # (sonst Self-Reinforcement). Hintergrund: PR Score-Konfidenz-
        # Tiers — siehe scripts/lint_score_confidence_isolation.py.
        run: python scripts/lint_score_confidence_isolation.py

      - name: Resolve run phase
        # Single-Source-of-Truth: scripts/resolve_run_phase.py löst den
        # RUN_PHASE-Wert auf. Schedule-Trigger nutzen festen Cron-Mapping
        # (0 10 → premarket, 0 21 → postclose). workflow_dispatch validiert
        # den User-Input gegen die aktuelle UTC-Zeit und forciert ein
        # Override, wenn Input + Tageszeit inkonsistent sind (z.B. iPhone-
        # Trigger mit `postclose` während laufender US-Session).
        # Schreibt RUN_PHASE in $GITHUB_ENV, sodass der nächste Step
        # ${{ env.RUN_PHASE }} liest.
        env:
          EVENT_NAME:     ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          USER_INPUT:     ${{ github.event.inputs.run_phase }}
        run: python scripts/resolve_run_phase.py

      - name: Pull squeeze_data from Gist
        env:
          GIST_ID:        ${{ secrets.GIST_ID }}
          GIST_TOKEN:     ${{ secrets.GIST_TOKEN }}
          POSITIONS_JSON: ${{ secrets.POSITIONS_JSON }}
        run: python scripts/pull_gist_data.py

      - name: Generate squeeze report
        env:
          NTFY_TOPIC:       ${{ secrets.NTFY_TOPIC }}
          EDGAR_USER_AGENT: ${{ secrets.EDGAR_USER_AGENT }}
          GIST_ID:          ${{ secrets.GIST_ID }}
          # QUOTE_PROXY_URL — Cloudflare-Worker-Endpoint für Live-Quotes
          # im Watchlist-Drawer / Top-10-Detail-Bereich. Optional: leer
          # → Frontend-Polling no-op, eingebrannte Werte bleiben sichtbar.
          # Setup: cloudflare/quote-proxy/README.md.
          QUOTE_PROXY_URL:  ${{ secrets.QUOTE_PROXY_URL }}
          # RUN_PHASE wird vom vorherigen Step `Resolve run phase` in
          # $GITHUB_ENV geschrieben — Resolution-Logik siehe
          # scripts/resolve_run_phase.py.
        run: python generate_report.py

      - name: Commit and publish report
        id: commit_report
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add index.html
          git add score_history.json 2>/dev/null || true
          git add watchlist_inactive.json 2>/dev/null || true
          git add watchlist_failures.json 2>/dev/null || true
          git add app_data.json 2>/dev/null || true
          git add service_worker.js 2>/dev/null || true
          git add backtest_history.json 2>/dev/null || true
          # score_inflation_log.jsonl: append-only Diagnose-Log für die
          # Intra-Day-Score-Inflations-Untersuchung. Pro Daily-Run werden
          # 10 Zeilen angehängt; prune entfernt Einträge > 30 Tage. Persistenz
          # über Commit nötig, sonst geht die Empirik bei jedem Workflow-Lauf
          # verloren.
          git add score_inflation_log.jsonl 2>/dev/null || true
          # Health-Check-Persistenz (Phase 1/2): die JSONL-Files werden vom
          # health_check.py-Hook lokal im Runner geschrieben — ohne ``git add``
          # gehen sie beim nächsten Workflow-Checkout verloren und der
          # Digest-Workflow findet nie echte Daten (Symptom 15.05.2026:
          # Digest sah dauerhaft 0 Runs).
          git add health_check_log.jsonl 2>/dev/null || true
          git add provider_health.jsonl 2>/dev/null || true
          # watchlist_personal.json wird vom vorigen Step
          # ``Pull squeeze_data from Gist`` (scripts/pull_gist_data.py)
          # aus dem User-Gist materialisiert. Ohne dieses ``git add`` bleibt
          # die Datei modified-unstaged und blockiert die anschließende
          # ``git pull --rebase``-Precondition (Bug-Symptom: „cannot pull
          # with rebase: You have unstaged changes" + irreführendes
          # „JSON-Konflikte erkannt"-Log via altem Recovery-Pfad).
          git add watchlist_personal.json 2>/dev/null || true
          # agent_state.json wird von process_exit_signals via
          # _exit_save_state() geschrieben, wenn ein Exit-/Profit-Push
          # gefeuert hat. Phase 2 Stufe 3 (Push-Pipeline) wird das
          # häufiger triggern — staging hier vorgezogen, damit der
          # Workflow nicht beim ersten echten Push-Event crashed.
          git add agent_state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine Aenderungen – Report ist aktuell."
            echo "COMMIT_EPOCH=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Daily squeeze report $(date -u '+%Y-%m-%d')"
          # Pull rebase before push to handle concurrent workflow runs.
          # Zwei distinkte Fehlerklassen separat behandeln:
          #
          # (a) Precondition-Fail VOR Rebase-Start — z.B. unstaged
          #     changes (Datei wurde geschrieben aber nicht ge-add-ed).
          #     Es gibt keinen Rebase-State; ``git rebase --continue``
          #     würde mit „no rebase in progress" crashen. Wir loggen
          #     den Working-Tree-Status und brechen ab — das deutet auf
          #     einen unvollständigen ``git add``-Block oben hin.
          #
          # (b) Konflikt MID-Rebase — typisch: KI-Agent hat parallel
          #     app_data.json / backtest_history.json gepusht. ``--ours``
          #     in dieser Phase = der LOKAL nach dem Pull aufliegende
          #     (= upstream) Stand → wir akzeptieren den parallelen Stand
          #     statt unseren zu erzwingen. Konflikte in nicht-JSON-
          #     Dateien bleiben Fehler (kein Silent-Overwrite von
          #     index.html etc.).
          if ! git pull --rebase origin main; then
            if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
              # Fall (b): Rebase ist gestartet, hat Konflikte
              conflicted=$(git diff --name-only --diff-filter=U)
              conflicted_other=$(echo "$conflicted" | grep -v '\.json$' || true)
              if [ -n "$conflicted_other" ]; then
                echo "ERROR: Konflikt in nicht-JSON-Dateien — Abbruch:"
                echo "$conflicted_other"
                git rebase --abort
                exit 1
              fi
              conflicted_json=$(echo "$conflicted" | grep '\.json$' || true)
              echo "JSON-Konflikte erkannt, übernehme --ours (upstream):"
              echo "$conflicted_json"
              for f in $conflicted_json; do
                git checkout --ours -- "$f"
                git add -- "$f"
              done
              GIT_EDITOR=true git rebase --continue
            else
              # Fall (a): Precondition-Fail, kein Rebase aktiv
              echo "ERROR: git pull --rebase scheiterte vor Rebase-Start."
              echo "Wahrscheinliche Ursache: Datei wurde geschrieben aber"
              echo "nicht ge-add-ed (siehe Working-Tree-Status unten)."
              echo "→ git add-Block oben um die fehlende Datei erweitern."
              git status --short
              exit 1
            fi
          fi
          git push origin main
          echo "COMMIT_EPOCH=$(date +%s)" >> "$GITHUB_OUTPUT"

      # Opt 6: Poll GitHub Pages Last-Modified until the new version is live.
      # Avoids blindly waiting a fixed interval; stops as soon as confirmed.
      - name: Verify GitHub Pages deployment
        if: github.event_name == 'workflow_dispatch' && steps.commit_report.outputs.COMMIT_EPOCH != '0'
        run: |
          PAGES_URL="https://easywebb911.github.io/Aktien-Update/"
          COMMIT_TIME="${{ steps.commit_report.outputs.COMMIT_EPOCH }}"
          MAX_WAIT=300
          INTERVAL=10
          START=$(date +%s)
          echo "Warte auf GitHub Pages Aktualisierung (max ${MAX_WAIT}s) …"
          while true; do
            ELAPSED=$(( $(date +%s) - START ))
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "WARNUNG: GitHub Pages nach ${MAX_WAIT}s noch nicht aktualisiert"
              exit 0
            fi
            LAST_MOD=$(curl -sI "$PAGES_URL" \
              | grep -i "^last-modified:" \
              | sed 's/^[Ll]ast-[Mm]odified:[ ]*//' \
              | tr -d '\r')
            if [ -n "$LAST_MOD" ]; then
              LM_EPOCH=$(date -d "$LAST_MOD" +%s 2>/dev/null || echo 0)
              if [ "$LM_EPOCH" -gt "$COMMIT_TIME" ]; then
                echo "GitHub Pages aktualisiert nach ${ELAPSED}s"
                exit 0
              fi
            fi
            sleep "$INTERVAL"
          done

      # Auto-Trigger des KI-Agent direkt nach erfolgreichem Daily-Run.
      # Hintergrund (Diagnose 14.05.2026): Daily-Run und KI-Agent driften
      # auseinander, sobald der Daily-Run außerhalb des regulären Cron-
      # Slots läuft (workflow_dispatch oder Re-Run nach Merge). Folge:
      # agent_signals.json hat alte Top-10, Daily-Run rendert ohne
      # KI-Score auf den Karten. Strukturelle Lösung: jeder Daily-Run
      # triggert seinen eigenen KI-Agent-Tick danach.
      #
      # Nicht-blockierend: `gh workflow run` returnt sofort, ohne auf
      # Completion zu warten. Fehler werden nur geloggt — Daily-Run-
      # Erfolg hängt nicht davon ab. Health-Check S7 fängt das Rest-
      # risiko (KI-Agent ist gestartet aber liefert keine Overlap-
      # Signale für die heutige Top-10) im nächsten Daily-Run.
      - name: Trigger KI-Agent tick
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh workflow run ki_agent.yml --ref main; then
            echo "KI-Agent-Tick erfolgreich getriggert (non-blocking)."
          else
            echo "WARNUNG: KI-Agent-Trigger fehlgeschlagen — Daily-Run nicht betroffen."
          fi
