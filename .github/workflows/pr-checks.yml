name: PR Checks (advisory)

# ADVISORY-Check — KEIN required-status-check, KEINE Branch-Protection.
# Diese Datei allein kann sich NICHT „required" machen: required-Checks sind
# eine Repo-Branch-Protection-EINSTELLUNG (Settings → Branches), nicht im
# Workflow-YAML setzbar. Solange diese Einstellung nicht angefasst wird
# (und sie wird es nicht), ist der Check reines Signal: er liefert ein
# check_run-Event (rot/grün) an den PR, blockiert aber den Merge NICHT.
# Die Self-Merge-Mechanik (Merge via MCP nach grünen lokalen Tests) bleibt
# unberührt — bei Rot fixt Claude nach, dann erneut grün.
#
# Zweck: schließt die „stilles-Netz"-Lücke (PR #313 riss den Golden-Test
# still, weil kein automatischer Lauf existierte). Fährt die deterministischen,
# netzfreien Checks bei jedem PR.

on:
  pull_request:

# Read-only: der Check kann nichts pushen, mergen oder blockieren.
permissions:
  contents: read

# Mehrere schnelle Pushes auf denselben PR → nur den letzten Lauf behalten.
concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      # Erzwingt UTF-8-Modus unabhängig von der Runner-Locale (Quelltext
      # enthält Umlaute/Emojis; alle Checks lesen zwar mit explizitem
      # encoding='utf-8', dies ist defensives Gürtel-und-Hosenträger).
      PYTHONUTF8: "1"
    steps:
      - name: Checkout PR
        # Default-Verhalten bei pull_request: Merge-Commit (PR auf base
        # gemergt) wird ausgecheckt — genau der Stand, der nach Merge auf
        # main läge. KEIN ``ref: main`` (das würde main statt des PR testen).
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        # NUR jinja2 (der einzige harte Modul-Level-Dep von generate_report,
        # zieht markupsafe automatisch). BEWUSST NICHT requirements.txt:
        # das installiert pandas_ta, dessen Import-Zeit-Introspektion
        # find_spec("yfinance") auf dem yfinance-STUB des Golden-Tests
        # (__spec__ is None) einen ValueError wirft (NICHT vom try/except
        # ImportError in generate_report.py:38 gefangen) → CI-Crash.
        # Ohne pandas_ta greift dort der ImportError-Pfad (ta=None) — exakt
        # der Zustand, in dem das Golden generiert wurde → byte-identischer
        # Render. Die übrigen externen Deps (yfinance/requests/bs4/
        # deep_translator/watchlist) stubbt der Golden-Test selbst; die 4
        # Lints brauchen gar keine Deps (reine stdlib).
        run: pip install "jinja2>=3.1.0"

      - name: Lint chat template
        run: python scripts/lint_chat_template.py

      - name: Lint JS-format escape
        run: python scripts/lint_jsformat_escape.py

      - name: Lint score-confidence isolation
        run: python scripts/lint_score_confidence_isolation.py

      - name: Lint token-crypto invariants
        run: python scripts/lint_token_crypto.py

      - name: Outer-Page golden test
        run: python scripts/mock_test_outer_page_golden.py

      # Phase-1-Gate-Ausbau: drei deterministische, netz-/datums-freie
      # Mock-Tests (Inventur belegt: Kategorie A, kein Real-State-/Datums-Read,
      # laufen auf stdlib+jinja2). EXPLIZITE ALLOWLIST — namentlich, KEIN
      # *.py-Glob/pytest-discover (würde die yfinance-Importer-Tests
      # mitziehen → flaky/rot). Fangen die Klassen, die still durchrutschten:
      # gist's ${var}-Grep = price_str-Klasse (#326); provider_health ×2 =
      # Wrapper-Regressions-Klasse (#325/#327/#330/#332).
      - name: Mock-Test gist action token routing
        run: python scripts/mock_test_gist_action_token_routing.py

      - name: Mock-Test provider-health (Tier 1)
        run: python scripts/mock_test_provider_health.py

      - name: Mock-Test provider-health (Tier 2)
        run: python scripts/mock_test_provider_health_tier2.py
