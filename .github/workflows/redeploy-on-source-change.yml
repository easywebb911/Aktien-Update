name: Redeploy index.html on source change

# GitHub Pages liefert das committed ``index.html`` 1:1 aus — kein
# Build-Step. ``index.html`` wird nur vom ``daily-squeeze-report.yml``-
# Workflow erzeugt (Schedule Mo-Fr 10:00 UTC + manueller Dispatch).
# Bei reinen Code-Änderungen (Phase 3 z. B.) blieb das deployed HTML
# bisher auf dem alten Stand bis zum nächsten Daily-Run.
#
# Dieser Workflow triggert ``daily-squeeze-report.yml`` automatisch
# per Dispatch, sobald ein Code-Push auf ``main`` eine der relevanten
# Quell-Dateien berührt — Pages bekommt das aktualisierte HTML
# innerhalb weniger Minuten ohne Wartezeit auf den nächsten Cron.

on:
  push:
    branches:
      - main
    paths:
      - 'generate_report.py'
      - 'config.py'
      - 'templates/**'
      - 'scripts/lint_chat_template.py'
      - 'requirements.txt'

permissions:
  actions: write

concurrency:
  # Mehrere schnell aufeinanderfolgende Source-Commits → nur den
  # letzten Trigger ausführen. Vermeidet redundante Runs.
  group: redeploy-on-source-change
  cancel-in-progress: true

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Dispatch daily-squeeze-report.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # daily-squeeze-report.yml verlangt seit PR #132 einen
          # workflow_dispatch.inputs.run_phase (required: true). Ohne
          # antwortet die GitHub-API HTTP 422 und der gesamte Auto-
          # Redeploy schlägt fehl. Phase clientseitig aus aktueller
          # UTC-Zeit bestimmen — analog zu scripts/resolve_run_phase.py
          # und der client-side-Logik in generate_report.py (PR #133):
          #   US-Session [13:30, 20:00) UTC → premarket
          #   sonst                          → postclose
          # Der Plausibilitäts-Override (resolve_run_phase.py) im
          # Daily-Run-Workflow korrigiert ohnehin Inkonsistenzen, der
          # Wert hier ist also nur ein „bester Vorschlag" und keine
          # harte Anforderung.
          NOW_HHMM=$(date -u +%H%M)
          if [ "$NOW_HHMM" -ge 1330 ] && [ "$NOW_HHMM" -lt 2000 ]; then
            RUN_PHASE="premarket"
          else
            RUN_PHASE="postclose"
          fi
          echo "UTC-Zeit ${NOW_HHMM} → run_phase=${RUN_PHASE}"
          gh workflow run daily-squeeze-report.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f run_phase="${RUN_PHASE}"
          echo "Daily-Squeeze-Report dispatched (run_phase=${RUN_PHASE}) — index.html wird ~5 min."
