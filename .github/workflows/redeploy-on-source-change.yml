name: Redeploy index.html on source change

# ⛔ DEAKTIVIERT (11.06.2026) — Auto-Trigger entfernt (Wurzel-Fix).
#
# Dieser Workflow dispatchte bei JEDEM Code-Merge auf ``main`` (relevante
# Quell-Dateien) einen VOLLEN ``daily-squeeze-report.yml``-Run — also
# Fetch + Score + Pushes + score_history-Write + ki_agent-Trigger, statt
# nur ``index.html`` neu zu deployen. Belegte gemeinsame Wurzel von:
#   • S3 (current_price-Lücken) / S4-Fehlalarm / Freitag-Cluster
#   • Exit-Pushes auf Pre-Open-/Nicht-finalen Daten
#   • score_history-/app_data-Churn an Merge-Tagen
# Der Off-Schedule-Run trug ``run_phase=postclose`` (UTC-abgeleitet,
# ``else → postclose``) und landete bei Pre-Open-Merges im falschen
# ET-Fenster. Render-Only-Alternative verworfen (kein vollständiger
# committeter Render-Input; ki_agent-Trigger sitzt workflow-seitig).
#
# Fix: der ``on: push``-Auto-Trigger ist entfernt → ein Code-Merge löst
# KEINEN automatischen Daily-Run mehr aus. Template-/Render-Änderungen
# werden beim nächsten regulären Cron sichtbar (daily-squeeze-report.yml:
# ``17 6`` + ``17 21`` Mo-Fr) oder via bewusstem manuellem Dispatch /
# Recalculate-Button (bewusste, seltene Einzelaktion — kein Auto-Pfad).
#
# REVERSIBEL: Workflow-Datei + Run-Logik bleiben erhalten; bei Bedarf
# (z. B. späterer Render-Only-Bau) den ``on: push``-Block unten
# wiederherstellen. Bis dahin ist nur noch ``workflow_dispatch``
# (manuell) aktiv — der Auto-Pfad ist tot.
#
# Historischer Kontext (Original-Zweck): GitHub Pages liefert das
# committed ``index.html`` 1:1 aus; reine Code-Änderungen blieben bis zum
# nächsten Daily-Run auf altem HTML. Dieser Workflow sollte das verkürzen
# — der Nebenwirkungs-Preis (voller Pipeline-Lauf) war es aber nicht wert.

on:
  workflow_dispatch:   # nur noch manuell — Auto-Trigger (on: push) entfernt
  # ── Auto-Trigger DEAKTIVIERT (11.06.2026, Wurzel-Fix). Zum Reaktivieren
  #    den folgenden Block einkommentieren:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'generate_report.py'
  #     - 'config.py'
  #     - 'templates/**'
  #     - 'scripts/lint_chat_template.py'
  #     - 'requirements.txt'

permissions:
  actions: write

concurrency:
  # Mehrere schnell aufeinanderfolgende Source-Commits → nur den
  # letzten Trigger ausführen. Vermeidet redundante Runs.
  group: redeploy-on-source-change
  cancel-in-progress: true

jobs:
  trigger-redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Dispatch daily-squeeze-report.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # daily-squeeze-report.yml verlangt seit PR #132 einen
          # workflow_dispatch.inputs.run_phase (required: true). Ohne
          # antwortet die GitHub-API HTTP 422 und der gesamte Auto-
          # Redeploy schlägt fehl. Phase clientseitig aus aktueller
          # UTC-Zeit bestimmen — analog zu scripts/resolve_run_phase.py
          # und der client-side-Logik in generate_report.py (PR #133):
          #   US-Session [13:30, 20:00) UTC → premarket
          #   sonst                          → postclose
          # Der Plausibilitäts-Override (resolve_run_phase.py) im
          # Daily-Run-Workflow korrigiert ohnehin Inkonsistenzen, der
          # Wert hier ist also nur ein „bester Vorschlag" und keine
          # harte Anforderung.
          NOW_HHMM=$(date -u +%H%M)
          if [ "$NOW_HHMM" -ge 1330 ] && [ "$NOW_HHMM" -lt 2000 ]; then
            RUN_PHASE="premarket"
          else
            RUN_PHASE="postclose"
          fi
          echo "UTC-Zeit ${NOW_HHMM} → run_phase=${RUN_PHASE}"
          gh workflow run daily-squeeze-report.yml \
            --repo "${{ github.repository }}" \
            --ref main \
            -f run_phase="${RUN_PHASE}"
          echo "Daily-Squeeze-Report dispatched (run_phase=${RUN_PHASE}) — index.html wird ~5 min."
