name: Health-Check Daily Digest

# Phase 3 — täglicher Aggregations-Push laut Spec
# docs/health_check_spec.md "Daily-Digest-Format".
#
# Cron-Offset (Stand 16.05.2026 nach erneuter Diagnose):
# - Spec-Wortlaut war ``0 8 * * *``.
# - Iteration 1 ``13 8 * * *`` wurde am 15.05. gedropt (State-Commit
#   erst um 10:37 UTC statt 08:13 → Drift > 2 h).
# - Iteration 2 ``21 8 * * *`` ebenfalls gedropt am 16.05. (08:21 Slot
#   nicht gefeuert; die 15.05.-Korrektur war nicht weit genug vom
#   Stunden-Peak entfernt).
# - Iteration 3 ``47 8 * * *`` — deutlich näher zur Stunden-Mitte,
#   analog ki_agent ``17 * * * *``-Erfolgs-Pattern (Coverage > 95 %).

on:
  schedule:
    - cron: '47 8 * * *'
  workflow_dispatch:   # Manueller Trigger jederzeit (Mehrfach-Trigger-
                       # Schutz im Skript via last_digest_sent-Datum).

permissions:
  contents: write   # Für Commit von health_check_digest_state.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install runtime dependencies
        run: pip install requests

      - name: Run Health-Check Digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/health_check_digest.py

      - name: Commit digest state
        if: always()   # state immer persistieren, auch wenn Skript exit 1
                       # bei ntfy-Send-Fail (16.05.2026 — Fail-Visibility-Fix).
                       # Sonst würde Mehrfach-Trigger-Schutz nicht greifen.
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add health_check_digest_state.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Keine state-Aenderung — kein Commit."
            exit 0
          fi
          git commit -m "Health-Check-Digest state $(date -u '+%Y-%m-%d')"
          # Cleanup-Logik analog ki_agent: bei Konflikten mit parallelem
          # Daily-Run/ki_agent-Push nehmen wir --ours fuer JSON-Files.
          if ! git pull --rebase origin main; then
            if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
              conflicted=$(git diff --name-only --diff-filter=U)
              conflicted_other=$(echo "$conflicted" | grep -v '\.json$' || true)
              if [ -n "$conflicted_other" ]; then
                echo "ERROR: Konflikt in nicht-JSON-Dateien — Abbruch:"
                echo "$conflicted_other"
                git rebase --abort
                exit 1
              fi
              conflicted_json=$(echo "$conflicted" | grep '\.json$' || true)
              echo "JSON-Konflikte erkannt, uebernehme --ours (digest-state):"
              echo "$conflicted_json"
              for f in $conflicted_json; do
                git checkout --ours -- "$f"
                git add -- "$f"
              done
              GIT_EDITOR=true git rebase --continue
            else
              echo "ERROR: git pull --rebase scheiterte vor Rebase-Start."
              git status --short
              exit 1
            fi
          fi
          git push origin main
