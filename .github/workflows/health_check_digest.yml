name: Health-Check Daily Digest

# Phase 3 — täglicher Aggregations-Push laut Spec
# docs/health_check_spec.md "Daily-Digest-Format".
#
# Cron-Offset (Stand 16.05.2026 nach erneuter Diagnose):
# - Spec-Wortlaut war ``0 8 * * *``.
# - Iteration 1 ``13 8 * * *`` wurde am 15.05. gedropt (State-Commit
#   erst um 10:37 UTC statt 08:13 → Drift > 2 h).
# - Iteration 2 ``21 8 * * *`` ebenfalls gedropt am 16.05. (08:21 Slot
#   nicht gefeuert; die 15.05.-Korrektur war nicht weit genug vom
#   Stunden-Peak entfernt).
# - Iteration 3 ``47 8 * * *`` — deutlich näher zur Stunden-Mitte,
#   analog ki_agent ``17 * * * *``-Erfolgs-Pattern (Coverage > 95 %).

on:
  schedule:
    - cron: '47 8 * * *'
  workflow_dispatch:   # Manueller Trigger jederzeit (Mehrfach-Trigger-
                       # Schutz im Skript via last_digest_sent-Datum).

permissions:
  contents: write   # Für Commit von health_check_digest_state.json

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install runtime dependencies
        run: pip install requests

      - name: Run Health-Check Digest
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/health_check_digest.py

      - name: Commit digest state
        if: always()   # state immer persistieren, auch wenn Skript exit 1
                       # bei ntfy-Send-Fail (16.05.2026 — Fail-Visibility-Fix).
                       # Sonst würde Mehrfach-Trigger-Schutz nicht greifen.
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # Robustes Persistieren des digest-state-Markers gegen parallele
          # Pushes. main ist sehr aktiv (ki_agent stuendlich `17 * * * *`,
          # Daily-Run mehrmals taeglich). Die alte Rebase-mit-Konflikt-
          # Aufloesung scheiterte reproduzierbar: entweder push-Reject
          # (non-fast-forward, kein Retry) oder --ours verwarf unter Rebase
          # die frische Schreibung. Folge: last_digest_sent kam nie nach
          # main, S8 zaehlte hoch (Fehlalarm trotz gruenem ntfy-Push).
          #
          # Neues Muster: die vom Skript geschriebene digest-state-Version
          # sichern, dann in einer Retry-Schleife auf den jeweils NEUESTEN
          # origin/main-Stand aufsetzen (reset --hard) + die frische Version
          # wieder einspielen + commit + push. Bei push-Reject neu fetchen
          # und erneut versuchen. Nur health_check_digest_state.json wird von
          # diesem Workflow geschrieben — keine anderen Files im Spiel, daher
          # ist reset --hard hier verlustfrei (frische Version in $RUNNER_TEMP).
          FRESH="${RUNNER_TEMP:-/tmp}/digest_state_fresh.json"
          cp health_check_digest_state.json "$FRESH"
          pushed=0
          for attempt in 1 2 3 4 5; do
            if ! git fetch origin main; then
              echo "fetch fehlgeschlagen (Versuch $attempt) — retry."
              sleep 2
              continue
            fi
            git reset --hard origin/main
            cp "$FRESH" health_check_digest_state.json
            git add health_check_digest_state.json
            if git diff --staged --quiet; then
              echo "Keine state-Aenderung gegenueber origin/main — kein Commit noetig."
              pushed=1
              break
            fi
            git commit -m "Health-Check-Digest state $(date -u '+%Y-%m-%d')"
            if git push origin main; then
              echo "digest-state gepusht (Versuch $attempt)."
              pushed=1
              break
            fi
            echo "push rejected (Versuch $attempt) — neu fetchen und retry."
            sleep 2
          done
          if [ "$pushed" -ne 1 ]; then
            echo "ERROR: digest-state konnte nach 5 Versuchen nicht gepusht werden."
            exit 1
          fi
          # Diagnose: welcher Marker tatsaechlich nach main ging.
          echo "Push-Check — last_digest_sent in main:"
          grep last_digest_sent health_check_digest_state.json || true
